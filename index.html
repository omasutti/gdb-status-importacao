<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>GDB — Status de Importação</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{font-family:'Inter',sans-serif;box-sizing:border-box;}
body{background:#EEF2F7;margin:0;}

.card-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1.1rem;
  padding:1.1rem;
}
@media(max-width:1380px){.card-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:960px) {.card-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px) {.card-grid{grid-template-columns:1fr;}}

.card{
  background:#fff;
  border:1.5px solid #C9D6E3;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,51,102,.07);
  cursor:pointer;
  transition:box-shadow .2s,transform .15s;
  display:flex;flex-direction:column;
}
.card:hover{box-shadow:0 8px 24px rgba(0,51,102,.15);transform:translateY(-2px);}

.progress-track{height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden;margin:7px 0 3px;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#003366 0%,#1a6ab5 100%);transition:width .6s ease;}

.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  backdrop-filter:blur(3px);
}
.modal-box{
  background:#fff;border-radius:12px;
  box-shadow:0 24px 64px rgba(0,0,0,.3);
  width:92%;max-width:600px;max-height:82vh;
  overflow-y:auto;padding:2rem;
}
.badge{
  display:inline-block;padding:2px 9px;
  border-radius:20px;font-size:.7rem;font-weight:700;
  letter-spacing:.02em;white-space:nowrap;
}
.alerta-data{color:#C53030!important;font-weight:700;}
.acc-table th{background:#EBF5FB;color:#003366;font-weight:700;font-size:.78rem;padding:6px 12px;text-align:left;}
.acc-table td{font-size:.82rem;color:#2D3748;padding:5px 12px;border-bottom:1px solid #EDF2F7;}
.acc-table tr:nth-child(even) td{background:#F7FAFC;}
.dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;display:inline-block;
  animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
</style>
</head>
<body>

<!-- CABEÇALHO -->
<div style="background:linear-gradient(135deg,#003366 0%,#0a4a8a 100%);color:#fff;
  padding:.85rem 1.4rem;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 3px 10px rgba(0,0,0,.25);">
  <div>
    <div style="font-size:1.25rem;font-weight:800;letter-spacing:-.01em;">
      GDB &mdash; Status de Importação
    </div>
    <div style="font-size:.75rem;color:#93C5FD;margin-top:2px;">
      Gasparini do Brasil &middot; Monitoramento de Pedidos Ativos
    </div>
  </div>
  <div style="text-align:right;">
    <div style="font-size:.72rem;color:#93C5FD;display:flex;align-items:center;gap:5px;justify-content:flex-end;">
      <span class="dot"></span> Atualizado em 30/06/2026 às 14:36
    </div>
    <div id="total" style="font-size:.85rem;font-weight:600;margin-top:3px;"></div>
  </div>
</div>

<!-- BARRA DE STATS -->
<div id="stats" style="background:#fff;border-bottom:1px solid #E2E8F0;
  padding:.6rem 1.2rem;display:flex;gap:.75rem;overflow-x:auto;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(0,0,0,.05);min-height:44px;align-items:center;"></div>

<!-- GRID DE CARDS -->
<div class="card-grid" id="grid"></div>

<!-- ESTADO VAZIO -->
<div id="vazio" style="display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;color:#94A3B8;text-align:center;">
  <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
    style="opacity:.35;margin-bottom:12px;">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
         a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 10v9a2 2 0 01-2 2z"/>
  </svg>
  <p style="font-size:1.1rem;font-weight:600;">Nenhum pedido ativo</p>
  <p style="font-size:.85rem;margin-top:6px;">Adicione arquivos .xlsx na pasta monitorada</p>
</div>

<!-- MODAL DE ACESSÓRIOS -->
<div id="modal" class="modal-overlay" style="display:none;" onclick="fecharModal(event)">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">
      <div>
        <h2 id="m-titulo" style="font-size:1.15rem;font-weight:800;color:#1A202C;"></h2>
        <p id="m-sub" style="font-size:.82rem;color:#718096;margin-top:3px;"></p>
      </div>
      <button onclick="document.getElementById('modal').style.display='none'"
        style="font-size:1.6rem;color:#A0AEC0;line-height:1;border:none;background:none;
        cursor:pointer;padding:0 4px;">&times;</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

const SC = {
  'Pedido Emitido':           ['#EBF5FB','#1A5276'],
  'Em Fabricação':            ['#FFF3E0','#BF360C'],
  'Pronto para Embarque':     ['#E8F5E9','#1B5E20'],
  'Em Transporte Marítimo':   ['#E3F2FD','#0D47A1'],
  'Desembaraço Aduaneiro':    ['#FCE4EC','#880E4F'],
  'Em Transporte Terrestre':  ['#F3E5F5','#4A148C'],
  'Em Estoque Local':         ['#E0F7FA','#006064'],
  'Em Testes':                ['#FFFDE7','#F57F17'],
  'Entregue':                 ['#E8F5E9','#1B5E20'],
};

function logBlock(c) {
  const fs = [
    ['Porto de Origem',      c.porto_origem],
    ['Situação do Trajeto',  c.status_trajeto],
    ['Navio',                c.navio],
    ['Prev. Chegada Porto',  c.previsao_porto],
    ['Porto de Destino',     c.porto_destino],
  ].filter(([,v]) => v && v.trim());
  if (!fs.length) return '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;' +
    'font-size:.73rem;margin-top:8px;padding-top:8px;border-top:1px solid #EDF2F7;">' +
    fs.map(([k,v]) =>
      '<span style="color:#94A3B8;font-weight:600;">'+k+'</span>' +
      '<span style="color:#4A5568;">'+v+'</span>'
    ).join('') + '</div>';
}

function render() {
  const grid  = document.getElementById('grid');
  const vazio = document.getElementById('vazio');
  const stats = document.getElementById('stats');
  grid.innerHTML = '';

  if (!CARDS.length) {
    vazio.style.display = 'flex';
    document.getElementById('total').textContent = '0 pedidos ativos';
    return;
  }
  vazio.style.display = 'none';

  const n = CARDS.length;
  document.getElementById('total').textContent =
    n + ' pedido' + (n > 1 ? 's' : '') + ' ativo' + (n > 1 ? 's' : '');

  // Stats bar
  const cnt = {};
  CARDS.forEach(c => { cnt[c.status] = (cnt[c.status]||0)+1; });
  stats.innerHTML = Object.entries(cnt).map(([s,n]) => {
    const [bg,fg] = SC[s] || ['#EEE','#333'];
    return '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;">' +
      '<span class="badge" style="background:'+bg+';color:'+fg+';">'+s+'</span>' +
      '<span style="font-weight:700;color:#374151;font-size:.88rem;">'+n+'</span></div>';
  }).join('<div style="width:1px;background:#E2E8F0;height:20px;flex-shrink:0;"></div>');

  CARDS.forEach((c, idx) => {
    const [bgS,fgS] = SC[c.status] || ['#EEE','#333'];
    const dtCls  = c.alerta_data ? 'alerta-data' : '';
    const obs    = c.observacoes
      ? '<p style="font-size:.72rem;color:#94A3B8;font-style:italic;margin-top:6px;' +
        'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+c.observacoes+'">' +
        c.observacoes+'</p>'
      : '';
    const accLbl = c.acessorios && c.acessorios.length
      ? '<span style="font-size:.68rem;color:#3182CE;font-weight:600;">'+
        c.acessorios.length+' acess.</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'card';
    div.onclick   = () => abrirModal(idx);
    div.innerHTML =
      '<div style="padding:14px 14px 12px;">' +

        // Cabeçalho
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;">' +
          '<div style="min-width:0;">' +
            '<p style="font-weight:700;color:#1A202C;font-size:.88rem;line-height:1.3;' +
               'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+c.cliente+'">'+c.cliente+'</p>' +
            '<p style="font-size:.77rem;color:#2B6CB0;font-weight:600;margin-top:2px;">'+c.modelo+'</p>' +
            '<p style="font-size:.7rem;color:#A0AEC0;font-family:monospace;margin-top:1px;">#'+c.matricula+'</p>' +
          '</div>' +
          '<span class="badge" style="background:'+bgS+';color:'+fgS+';flex-shrink:0;margin-top:2px;">'+c.status+'</span>' +
        '</div>' +

        // Datas
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;' +
           'background:#F7FAFC;border-radius:8px;padding:8px 4px;gap:0;">' +
          '<div>' +
            '<p style="font-size:.65rem;color:#94A3B8;font-weight:600;line-height:1.2;">Pedido</p>' +
            '<p style="font-size:.75rem;color:#4A5568;font-weight:500;margin-top:2px;">'+
              (c.data_pedido||'—')+'</p>' +
          '</div>' +
          '<div style="border-left:1px solid #E2E8F0;border-right:1px solid #E2E8F0;">' +
            '<p style="font-size:.65rem;color:#94A3B8;font-weight:600;line-height:1.2;">Original</p>' +
            '<p style="font-size:.75rem;color:#4A5568;font-weight:500;margin-top:2px;">'+
              (c.data_original||'—')+'</p>' +
          '</div>' +
          '<div>' +
            '<p style="font-size:.65rem;color:#94A3B8;font-weight:600;line-height:1.2;">Estimada</p>' +
            '<p class="'+dtCls+'" style="font-size:.75rem;font-weight:500;margin-top:2px;'+
              (c.alerta_data?'':'color:#4A5568;')+'">'+
              (c.data_estimada||'—')+'</p>' +
          '</div>' +
        '</div>' +

        // Logística
        logBlock(c) +
        obs +

        // Progresso
        '<div style="margin-top:10px;">' +
          '<div class="progress-track">' +
            '<div class="progress-fill" style="width:'+c.progresso+'%;"></div>' +
          '</div>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<span style="font-size:.68rem;color:#94A3B8;">'+c.progresso+'% concluído</span>' +
            accLbl +
          '</div>' +
        '</div>' +

      '</div>';

    grid.appendChild(div);
  });
}

function abrirModal(idx) {
  const c = CARDS[idx];
  document.getElementById('m-titulo').textContent = c.cliente;
  document.getElementById('m-sub').textContent    = c.modelo + '  ·  #' + c.matricula;

  let html = '';
  if (c.acessorios && c.acessorios.length) {
    html = '<p style="font-weight:700;color:#2D3748;font-size:.88rem;margin-bottom:10px;">' +
      'Acessórios Selecionados (' + c.acessorios.length + ')</p>' +
      '<table class="acc-table" style="width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;">' +
      '<thead><tr>' +
        '<th>Acessório</th>' +
        '<th>Especificação / Detalhe</th>' +
      '</tr></thead><tbody>' +
      c.acessorios.map(a =>
        '<tr><td>'+a.nome+'</td><td style="color:#718096;">'+(a.desc||'—')+'</td></tr>'
      ).join('') +
      '</tbody></table>';
  } else {
    html = '<p style="text-align:center;color:#94A3B8;padding:40px 0;font-size:.9rem;">' +
      'Nenhum acessório registrado neste pedido.</p>';
  }

  document.getElementById('m-body').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function fecharModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').style.display = 'none';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').style.display = 'none';
});

render();
</script>
